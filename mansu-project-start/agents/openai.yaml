interface:
  display_name: "Mansu Project Start"
  short_description: "Legacy/specialized compatibility route"
  default_prompt: "Use $mansu-project-start only as a legacy/specialized compatibility route when it is explicitly requested or an older workflow depends on that callable name. For normal use, including new starts, vague ideas, or broad feature definition, prefer $mansu-1define, then $mansu-2plan. When this compatibility route is used, run $mansu-project-start as a thin project-start orchestrator: check `ooo` / `ouroboros` first and route early definition to `ouroboros init start` / `ouroboros-interview`, PM, Seed, or brownfield before Mansu drafts its own questions; choose the best remaining source route across gstack, Oh My, addyosmani, project-local docs, Open Design as a callable design-artifact route when installed/approved, and VoltAgent/awesome-design-md as DESIGN.md reference-only input; avoid duplicating selected source logic; for user-facing UI, choose a design source route before phase roadmap planning instead of asking Mansu-owned design questions; ask the user only for decisions that materially change direction; if Ouroboros is missing or skipped, record `Ouroboros skipped reason` and label any Mansu-only kickoff as fallback; satisfy the minimum gate before handoff by answering purpose, user/problem, evidence, assumptions, direction, order, and execution bridge; keep source artifacts, research, spec, TDR, DESIGN.md/design direction, and project roadmap outside PLAN.md; before calling $mansu-tdd-total, create or update a repo-visible phase roadmap with an ordered phase list and exactly one active phase; derive the current phase execution-ready PLAN.md from that active phase only, with ordered slices, validation path, gate mapping, and mansu-tdd-total mode hints; if UI is in scope but no design route was selected, or if the roadmap artifact, phase list, active phase, or current phase PLAN.md is missing, stop with Implementation handoff: blocked instead of entering $mansu-tdd-total; otherwise hand that phase to $mansu-tdd-total for slice-level planning, implementation, review, QA, and checkpoint."
