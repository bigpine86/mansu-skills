interface:
  display_name: "Mansu Project Start"
  short_description: "Zero-to-PLAN project kickoff"
  default_prompt: "Use $mansu-project-start as a thin project-start orchestrator: for a new or fuzzy project, check `ooo` / `ouroboros` first and route early definition to `ouroboros init start` / `ouroboros-interview`, PM, Seed, or brownfield before Mansu drafts its own questions; choose the best remaining source route across gstack, Oh My, addyosmani, project-local docs, Open Design as a callable design-artifact route when installed/approved, and VoltAgent/awesome-design-md as DESIGN.md reference-only input; avoid duplicating selected source logic; for user-facing UI, choose a design source route before phase roadmap planning instead of asking Mansu-owned design questions: use Oh My research/deepsearch or addyosmani source-driven-development for visual/taste research, Open Design for artifact generation when installed/approved, VoltAgent/awesome-design-md as DESIGN.md reference corpus, gstack-design-consultation or gstack-design-shotgun for direction exploration, and gstack-plan-design-review or gstack-design-review for critique; ask the user only for decisions that materially change direction; if Ouroboros is missing or skipped, record `Ouroboros skipped reason` and label any Mansu-only kickoff as fallback; satisfy the Zero-to-PLAN minimum gate before handoff by answering purpose, user/problem, evidence, assumptions, direction, order, and execution bridge; keep source artifacts, research, spec, TDR, DESIGN.md/design direction, and project roadmap outside PLAN.md; before calling $mansu-tdd-total, create or update a repo-visible phase roadmap with an ordered phase list and exactly one active phase; derive the current phase execution-ready PLAN.md from that active phase only, with ordered slices, validation path, gate mapping, and mansu-tdd-total mode hints; if UI is in scope but no design route was selected, or if the roadmap artifact, phase list, active phase, or current phase PLAN.md is missing, stop with Implementation handoff: blocked instead of entering $mansu-tdd-total; otherwise hand that phase to $mansu-tdd-total for slice-level planning, implementation, review, QA, and checkpoint."
