interface:
  display_name: "Mansu TDD Total"
  short_description: "End-to-end TDD orchestrator that plans, slices, executes, and verifies"
  default_prompt: "Use $mansu-tdd-total end to end: before implementation, locate the active Phase Plan by explicit user-provided path first, otherwise by role/marker discovery in PLAN.md, Plan.md, .codex/plans/*.md, .omo/plans/*.md, and linked planning docs; treat PLAN.md as a common filename candidate, not a requirement, and do not claim no plan just because the filename differs. Confirm the active Phase Plan names one active/current/next phase, links to the Project Phase Roadmap when separate, and has an execution-ready slice table plus validation gates. Read the linked Project Phase Roadmap first for phase order and exit criteria, then execute only the active Phase Plan slice table; do not implement from a Project Phase Roadmap alone. If the active phase, Project Phase Roadmap link/section, or phase execution plan is missing, route back to public mansu-1define / mansu-2plan instead of implementing. Map Planner/Critics/Synthesizer roles, attempt real critic agents for non-trivial work when safely available, map the required Oh My modes ralph and tdd plus core gstack gates gstack-review, gstack-qa-only/gstack-browse, gstack-qa, gstack-context-save, gstack-context-restore, and gstack-health to the current runtime, record the execution-ready plan and slice table in the active Phase Plan, decide mansu-tdd-lite vs mansu-tdd-strict per slice, mark strict-prerequisite-missing slices blocked instead of downgrading them, run every unblocked slice sequentially through the mapped gates plus commit, update the worklog, then finish with project-level verification, final commit accounting, remaining risks, follow-up checks, and the no-skip completion checklist. Do not claim completion if any required evidence is missing."
