interface:
  display_name: "Mansu TDD Total"
  short_description: "End-to-end TDD orchestrator that plans, slices, executes, and verifies"
  default_prompt: "Use $mansu-tdd-total end to end: before implementation, confirm PLAN.md names one active phase and links to the project roadmap or phase-order artifact for project-started work; if the active phase, roadmap/phase-order artifact, or phase-only PLAN is missing, route back to $mansu-project-start instead of implementing; map Planner/Critics/Synthesizer roles, attempt real critic agents for non-trivial work when safely available, map the required Oh My modes ralph and tdd plus core gstack gates gstack-review, gstack-qa-only/gstack-browse, gstack-qa, gstack-context-save, gstack-context-restore, and gstack-health to the current runtime, record the execution-ready plan and slice table in PLAN.md, decide mansu-tdd-lite vs mansu-tdd-strict per slice, mark strict-prerequisite-missing slices blocked instead of downgrading them, run every unblocked slice sequentially through the mapped gates plus commit, update the worklog, then finish with project-level verification, final commit accounting, remaining risks, follow-up checks, and the no-skip completion checklist. Do not claim completion if any required evidence is missing."
