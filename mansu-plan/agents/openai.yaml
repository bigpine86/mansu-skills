interface:
  display_name: Mansu Plan
  short_description: Create requirements, feature priority, phase roadmap, active phase plan, and slice-ready implementation order.
  default_prompt: Use $mansu-plan as the backing Plan implementation to consume the Define handoff, including any feature candidates, priority signals, and design intent seed, and turn it into an execution-ready plan. Teach and preserve the hierarchy: Feature Priority / MVP Cut -> Project Phase Roadmap -> Phase Plan -> Slice. Choose the planning tier: Quick Plan for a narrow low-risk change, Standard Plan for normal feature work, Heavy Plan for a new app, major feature family, unclear architecture, or high-risk work. Do not return a shallow outline. ULW deep interview is planning-density support after definition, not the definition source; if explicit OMO planning was invoked, reconcile that output into requirements, phase boundaries, slice order, risks, and validation gates. Produce requirements/spec, architecture/interface decisions, DESIGN.md creation/refinement or a no-design-needed reason, design artifacts/direction when relevant, environment/dependency setup, Project Phase Roadmap with exit criteria, and exactly one active Phase Plan with ordered vertical Slices, acceptance criteria, likely impact files, validation commands, risks, blockers, and checkpoint rules. Use addyosmani planning/spec/API sources and gstack-autoplan or focused gstack plan reviewers when available, or record the skipped critique route and reason. For a new repo/app or Python project without established dependency setup, include an environment setup slice and prefer uv/.venv when appropriate; for existing feature work, follow the repo's current package manager and environment conventions. Prefer PLAN.md, but support Plan.md, .codex/plans/*.md, .omo/plans/*.md, or a concrete plan path the user referenced. End by stating whether Plan is complete; if complete, tell the user to use public mansu-3build next.
