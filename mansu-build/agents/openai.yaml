interface:
  display_name: Mansu Build
  short_description: Build the active phase through Mansu TDD slices.
  default_prompt: Use $mansu-build as the backing Build implementation only after an active phase execution plan exists. PLAN.md is preferred, but also check Plan.md, .codex/plans/*.md, .omo/plans/*.md, and any concrete plan path the user referenced; do not claim no plan just because the filename differs. Before non-trivial implementation, read the active plan and any linked roadmap/spec/TDR/design direction it names. If the active plan is missing, incomplete, or lacks a current/next phase with slice boundaries and validation gates, route back to public mansu-1define / mansu-2plan. Do not implement from a whole-project roadmap that lacks an active phase. Use mansu-tdd-total for the active phase slices. End by naming the next route: next public mansu-3build slice, public mansu-4verify, or mansu-debug.
