interface:
  display_name: Mansu Build
  short_description: Build the active phase through Mansu TDD slices.
  default_prompt: Use $mansu-build as the backing Build implementation only after an active Phase Plan exists. Follow Feature Priority / MVP Cut -> Project Phase Roadmap -> Phase Plan -> Slice: read the linked Project Phase Roadmap first for phase order and exit criteria, then execute only the active Phase Plan slice table. Discovery precedence is user-provided path first; otherwise use role/marker discovery to find an active Phase Plan in PLAN.md, Plan.md, .codex/plans/*.md, .omo/plans/*.md, or linked planning docs; do not claim no plan just because the filename differs. Before non-trivial implementation, read the active Phase Plan plus its linked Project Phase Roadmap and any spec/TDR/design direction it names. If the active Phase Plan is missing, incomplete, or lacks a slice table for the current/next phase, route back to public mansu-1define / mansu-2plan. Do not implement from a Project Phase Roadmap alone. Use mansu-tdd-total for the active Phase Plan slices. End by naming the next route: next public mansu-3build slice, public mansu-4verify, or mansu-debug.
