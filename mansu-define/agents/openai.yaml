interface:
  display_name: Mansu Define
  short_description: Define project purpose, requirements, and source of truth before planning.
  default_prompt: Use $mansu-define as the backing Define implementation before planning or implementation. For a new or fuzzy idea, discover and use Ouroboros interview first. In Codex, use tool discovery for ouroboros interview and prefer mcp__ouroboros.ouroboros_interview with initial_context set to the user's idea and cwd set to the project directory; do not require legacy ooo interview, and do not run Claude/omc adapter commands unless the detected runtime is Claude Code. Treat a user-written one-line, three-line, feature-list, or short product brief as seed context for Ouroboros interview, not as a completed definition. After Ouroboros or cited existing definition evidence, if user-facing UI/product scope is present, route to a source-skill design-context interview before public mansu-2plan; the default installed route is gstack-design-consultation. Define records only a design intent seed and route evidence for handoff; DESIGN.md remains owned by mansu-2plan, and Define must not create a Mansu-owned design questionnaire. If Ouroboros is missing, route to mansu-9setup in install mode, and if installed Ouroboros/runtime MCP integration is stale, not exposed, or broken, route to mansu-9setup in update or repair mode before asking Mansu-owned definition questions. Label any non-Ouroboros definition as fallback. End by stating whether Define is complete; if complete, tell the user to use public mansu-2plan next, and never jump directly to public mansu-3build.
