interface:
  display_name: Mansu 1 Define
  short_description: Define what to build before planning.
  default_prompt: Use $mansu-1define as the primary numbered route backed by mansu-define. Read mansu-define/SKILL.md, then for a new or fuzzy idea discover and use Ouroboros interview before any Mansu-owned questions. In Codex, use tool discovery for ouroboros interview and prefer mcp__ouroboros.ouroboros_interview with initial_context set to the user's idea and cwd set to the project directory; do not require legacy ooo interview, and do not run Claude/omc adapter commands unless the detected runtime is Claude Code. Treat short user idea notes as seed context for Ouroboros interview rather than a completed definition. Do not substitute ULW deep interview, OMO ulw-plan, gstack office-hours, or gstack-design-consultation for the Ouroboros definition gate. If Ouroboros is missing or the MCP route is not exposed/broken, route to mansu-9setup install/update/repair before fallback questions. After Ouroboros route user-facing UI/product scope to source-skill design-context interview before mansu-2plan; the default installed route is gstack-design-consultation. Record only a design intent seed and handoff evidence; DESIGN.md remains owned by mansu-2plan, and do not create a Mansu-owned design questionnaire. Complete the definition gate, and if complete tell the user to use mansu-2plan next.
