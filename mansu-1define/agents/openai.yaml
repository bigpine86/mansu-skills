interface:
  display_name: Mansu 1 Define
  short_description: Define what to build before planning.
  default_prompt: Use $mansu-1define as the primary numbered route backed by mansu-define. Read mansu-define/SKILL.md, treat short user idea notes as seed context for Ouroboros interview rather than a completed definition, and after Ouroboros route user-facing UI/product scope to source-skill design-context interview before mansu-2plan; the default installed route is gstack-design-consultation. Record only a design intent seed and handoff evidence; DESIGN.md remains owned by mansu-2plan, and do not create a Mansu-owned design questionnaire. Complete the definition gate, and if complete tell the user to use mansu-2plan next.
