interface:
  display_name: "Mansu Setup"
  short_description: "Runtime-aware Mansu bootstrap and updater"
  default_prompt: "Use $mansu-setup to detect the runtime target, agent host, and OS, find the Mansu repo or clone https://github.com/bigpine86/mansu-skills.git into the canonical local Mansu repo path when missing, install or update Ouroboros, gstack, and the matching Oh My adapter when explicitly needed, prepare Open Design only when UI/design artifact work needs it or the user approves it, read/verify the Mansu manual agent guide and catalog, choose the right skill directory, verify Ouroboros, gstack, Oh My / OMO / OMC, addyosmani/agent-skills, VoltAgent/awesome-design-md, and Open Design source freshness in read-only source-check mode by default, and for Codex verify with tool_search that mcp__ouroboros.ouroboros_interview is discoverable; if the Ouroboros CLI exists but Codex MCP is missing or broken, run ouroboros setup --runtime codex --mcp-mode auto --non-interactive when safe, then re-check tool_search before syncing, run Open Design CLI/lifecycle commands directly when approved instead of asking the user to copy them, sync and register Mansu skills only after approved update/install/repair, and for Codex replace stale Mansu-owned copies in the selected Codex skill directory from the current checkout, hand off source-reference drift to $mansu-source-curator, report optional adapter compatibility, run validation, and report skipped checks or compatibility drift."
