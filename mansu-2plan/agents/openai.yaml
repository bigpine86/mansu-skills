interface:
  display_name: Mansu 2 Plan
  short_description: Plan the defined work before building.
  default_prompt: Use $mansu-2plan as the primary numbered route backed by mansu-plan. Read mansu-plan/SKILL.md, consume the Define handoff including any feature candidates, priority signals, and design intent seed, and keep this hierarchy explicit: Feature Priority / MVP Cut -> Project Phase Roadmap -> Phase Plan -> Slice. Pick Quick Plan for small low-risk changes, Standard Plan for ordinary feature work, or Heavy Plan for new apps, major feature families, unclear architecture, or high-risk work. Do not return a shallow outline. Own DESIGN.md creation/refinement, design artifacts, design direction, environment setup when needed, the Project Phase Roadmap with exit criteria, and exactly one active Phase Plan with ordered vertical Slices, acceptance criteria, likely impact files, validation commands, risks, blockers, and checkpoint rules. Use addyosmani planning/spec/API sources and gstack-autoplan or focused gstack plan reviewers when available, or record the skipped critique route and reason. If complete tell the user to use mansu-3build next.
